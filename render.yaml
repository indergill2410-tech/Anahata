services:
  # ── PocketBase database ────────────────────────────────────────────────────
  - type: web
    name: anahata-pocketbase
    env: docker
    dockerfilePath: ./pocketbase/Dockerfile
    region: singapore
    plan: starter
    healthCheckPath: /api/health
    autoDeploy: true
    disk:
      name: pb-data
      mountPath: /pb/pb_data
      sizeGB: 1

  # ── Backend API + WebSocket server ─────────────────────────────────────────
  - type: web
    name: anahata-backend
    env: node
    region: singapore
    plan: starter
    rootDir: .
    buildCommand: "npm ci && cd client && npm ci && npm run build"
    startCommand: "node server/index.js"
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: NODE_OPTIONS
        value: --max-old-space-size=460

      # PocketBase on Render (set after first deploy)
      - key: POCKETBASE_URL
        value: https://anahata-pocketbase.onrender.com

      - key: JWT_SECRET
        sync: false

      - key: SENTRY_DSN
        sync: false

      - key: AI_MUSIC_API_KEY
        sync: false
      - key: AI_MUSIC_API_URL
        sync: false

      - key: POCKETBASE_ADMIN_EMAIL
        sync: false
      - key: POCKETBASE_ADMIN_PASSWORD
        sync: false

      # Cloudflare R2 (audio storage)
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        value: anahata-tracks
      - key: R2_PUBLIC_URL
        sync: false
