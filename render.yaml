services:
  - type: web
    name: anahata-backend
    env: node
    region: singapore
    plan: starter
    buildCommand: "npm install"
    startCommand: "node server/index.js"
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: AI_MUSIC_API_KEY
        sync: false
      - key: AI_MUSIC_API_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
