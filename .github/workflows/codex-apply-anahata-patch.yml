name: Codex Apply Anahata Patch

on:
  push:
    branches:
      - "codex/anahata-final-patch-20260711"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout helper branch
        uses: actions/checkout@v4
        with:
          ref: codex/anahata-final-patch-20260711
          fetch-depth: 0
      - name: Apply patch to main
        run: |
          set -euo pipefail
          fail() { echo "::error title=Codex patch failed::$1"; exit 1; }
          echo "::notice title=Codex patch::decode patch"
          cat .codex/anahata-final.patch.b64.part* | base64 -d > /tmp/anahata-final.patch || fail "decode patch failed"
          echo "::notice title=Codex patch::configure git"
          git config user.name "codex" || fail "git config name failed"
          git config user.email "codex@openai.com" || fail "git config email failed"
          echo "::notice title=Codex patch::fetch main"
          git fetch origin main:refs/remotes/origin/main || fail "fetch main failed"
          echo "::notice title=Codex patch::checkout main"
          git checkout -B main refs/remotes/origin/main || fail "checkout main failed"
          echo "::notice title=Codex patch::check patch"
          git apply --ignore-space-change --ignore-whitespace --whitespace=nowarn --check /tmp/anahata-final.patch || fail "patch check failed"
          echo "::notice title=Codex patch::apply patch"
          git apply --ignore-space-change --ignore-whitespace --whitespace=nowarn /tmp/anahata-final.patch || fail "patch apply failed"
          git status --short
          echo "::notice title=Codex patch::stage files"
          git add -A || fail "git add failed"
          echo "::notice title=Codex patch::commit"
          git commit -m "Complete Anahata universe UX and verification" || fail "git commit failed"
          echo "::notice title=Codex patch::push main"
          git push origin HEAD:main || fail "push main failed"
