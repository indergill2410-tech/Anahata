# Anahata backend + frontend deployment config for Fly.io
app = "anahata-backend"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[env]
  NODE_ENV = "production"
  PORT = "3001"
  POCKETBASE_URL = "https://anahata-pocketbase.fly.dev"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
